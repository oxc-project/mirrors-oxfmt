name: main

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions: {}

jobs:
  build:
    name: main
    runs-on: ubuntu-latest
    permissions:
      contents: write # Push the auto/update-mirror branch and mirror tags.
      pull-requests: write # Create and auto-merge the mirror PR.
    steps:
      - uses: taiki-e/checkout-action@3ab630d442e198ebb0ca30872832406ca01c46eb # v1.4.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - run: pip install pre-commit-mirror-maker
      - run: git config --global user.name 'Github Actions'
      - run: git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
      - run: pre-commit-mirror . --language=node --package-name=oxfmt --description="Formatter for the JavaScript Oxidation Compiler" --types-or=javascript --types-or=jsx --types-or=ts --types-or=tsx

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create mirror update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: auto/update-mirror
        run: |
          if [ "$(git rev-list --count origin/main..HEAD)" = "0" ]; then
            echo "No mirror updates"
            exit 0
          fi

          git remote set-url origin "https://x-access-token:$GH_TOKEN@github.com/$GITHUB_REPOSITORY"
          git push --force origin "HEAD:refs/heads/$BRANCH"

          for tag in $(git tag --list); do
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null; then
              echo "Tag $tag already exists"
            else
              git push origin "refs/tags/$tag"
            fi
          done

          pr_number="$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$pr_number" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update pre-commit mirror" \
              --body "Automated pre-commit mirror update triggered by a change to main."
            pr_number="$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number')"
          else
            gh pr edit "$pr_number" \
              --title "chore: update pre-commit mirror" \
              --body "Automated pre-commit mirror update triggered by a change to main."
          fi

          gh pr merge --squash --auto --delete-branch "$pr_number"
