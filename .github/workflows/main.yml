name: main

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions: {}

jobs:
  build:
    name: main
    runs-on: ubuntu-latest
    permissions:
      contents: write # Push the auto/update-mirror branch and mirror tags.
      pull-requests: write # Create and auto-merge the mirror PR.
    steps:
      - uses: taiki-e/checkout-action@3ab630d442e198ebb0ca30872832406ca01c46eb # v1.4.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - run: pip install pre-commit-mirror-maker
      - run: git config --global user.name 'Github Actions'
      - run: git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
      - run: pre-commit-mirror . --language=node --package-name=oxfmt --description="Formatter for the JavaScript Oxidation Compiler" --types-or=javascript --types-or=jsx --types-or=ts --types-or=tsx

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Prepare mirror update
        id: mirror
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "$(git rev-list --count origin/main..HEAD)" = "0" ]; then
            echo "No mirror updates"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git remote set-url origin "https://x-access-token:$GH_TOKEN@github.com/$GITHUB_REPOSITORY"

          for tag in $(git tag --list); do
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null; then
              echo "Tag $tag already exists"
            else
              git push origin "refs/tags/$tag"
            fi
          done

          git reset --mixed origin/main
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        if: steps.mirror.outputs.updated == 'true'
        id: cpr
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: auto/update-mirror
          delete-branch: true
          base: main
          title: "chore: update pre-commit mirror"
          commit-message: "chore: update pre-commit mirror"
          body: Automated pre-commit mirror update triggered by a change to `main`.
          add-paths: |
            .pre-commit-hooks.yaml
            .version
            package.json

      - if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --squash --auto --delete-branch "$PR_NUMBER"
